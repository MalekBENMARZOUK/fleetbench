name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: '0 3 * * 1'

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.lock
          python -m pip install -e . --no-deps

      - name: Run tests
        run: python -m pytest --cov=ev_fleet_benchmark --cov-report=term-missing --cov-report=xml

      - name: Run Ruff
        run: |
          python -m ruff check src tests scripts
          python -m ruff format --check src tests scripts

      - name: Run mypy
        run: python -m mypy

      - name: Run compileall
        run: python -m compileall src tests scripts

      - name: Run pip check
        run: python -m pip check

      - name: Smoke benchmark CLI
        run: fleetbench benchmark --output-dir results/ci-smoke --family urban_depot_small --method naive_baseline --method optimization_ortools --method rolling_horizon_ortools --method stochastic_anticipatory --seeds 101 --no-plots --progress-file results/ci-smoke/progress.jsonl

      - name: Smoke sensitivity CLI
        run: fleetbench sensitivity --output-dir results/ci-sensitivity --start-seed 101 --seed-count 1 --profile baseline --profile tariff_stress --method naive_baseline --method optimization_ortools --bootstrap-samples 50 --progress-file results/ci-sensitivity/progress.jsonl

      - name: Compare against retained profiling baseline
        run: |
          if [ -f baselines/method_profile_summary.csv ]; then
            python scripts/profile_methods.py --output-dir results/ci-profile-compare --family urban_depot_small --method naive_baseline --method optimization_ortools --seed 101 --baseline-summary baselines/method_profile_summary.csv --fail-on-regression
          else
            echo "No retained profiling baseline found; skipping comparison."
          fi

      - name: Upload smoke artifacts
        uses: actions/upload-artifact@v4
        with:
          name: fleetbench-smoke-${{ matrix.python-version }}
          path: |
            results/ci-smoke
            results/ci-sensitivity
            results/ci-profile-compare
            coverage.xml

  package:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install packaging tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine

      - name: Build distribution
        run: python -m build

      - name: Validate package metadata and README rendering
        run: python -m twine check dist/*

      - name: Upload distribution artifacts
        uses: actions/upload-artifact@v4
        with:
          name: fleetbench-dist
          path: dist/

  scheduled-profile:
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.lock
          python -m pip install -e . --no-deps

      - name: Run scheduled profiling benchmark
        run: python scripts/profile_methods.py --output-dir results/scheduled-profile --family urban_depot_small --family capacity_stressed_peak --method naive_baseline --method optimization_ortools --method rolling_horizon_ortools --seed 101 --seed 102 --seed 103

      - name: Compare scheduled profile against retained baseline
        run: |
          if [ -f baselines/method_profile_summary.csv ]; then
            python scripts/profile_methods.py --output-dir results/scheduled-profile-compare --family urban_depot_small --family capacity_stressed_peak --method naive_baseline --method optimization_ortools --method rolling_horizon_ortools --seed 101 --seed 102 --seed 103 --baseline-summary baselines/method_profile_summary.csv
          else
            echo "No retained profiling baseline found; skipping scheduled comparison."
          fi

      - name: Upload scheduled profile artifacts
        uses: actions/upload-artifact@v4
        with:
          name: fleetbench-scheduled-profile
          path: |
            results/scheduled-profile
            results/scheduled-profile-compare
